name: Build MicroPython + TWAI + TFTCore for ESP32-S3

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y git wget flex bison gperf python3 python3-pip \
            python3-venv cmake ninja-build ccache libffi-dev libssl-dev dfu-util \
            libusb-1.0-0

      - name: Clone ESP-IDF v5.4.1
        run: |
          cd $HOME
          git clone -j8 -b v5.4.1 --recursive https://github.com/espressif/esp-idf.git esp-idf
          cd esp-idf
          ./install.sh esp32s3

      - name: Clone MicroPython v1.25.0
        run: |
          cd $HOME
          git clone --recursive https://github.com/micropython/micropython.git
          cd micropython
          git checkout v1.25.0
          git submodule update --init --recursive

      - name: Clone TWAI/CAN module
        run: |
          cd $HOME
          mkdir -p cmodules
          cd cmodules
          git clone https://github.com/doctorsoffix/ESP32TWAI.git micropython-esp32-twai

      - name: Copy TFTCore module from repo
        run: |
          cp -r $GITHUB_WORKSPACE/tftcore $HOME/cmodules/tftcore

      - name: Create combined C modules CMake
        run: |
          cat > $HOME/cmodules/micropython.cmake << 'CMAKE'
          # Combined USER_C_MODULES: TWAI + TFTCore
          include(${CMAKE_CURRENT_LIST_DIR}/micropython-esp32-twai/src_can_v2/micropython.cmake)
          include(${CMAKE_CURRENT_LIST_DIR}/tftcore/micropython.cmake)
          CMAKE

      - name: Patch mod_can.c for MicroPython v1.25 + soft-reboot fix
        run: |
          cd $HOME/cmodules/micropython-esp32-twai/src_can_v2

          sed -i 's/mp_raise_NotImplementedError("\([^"]*\)")/mp_raise_NotImplementedError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_TypeError("\([^"]*\)")/mp_raise_TypeError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_ValueError("\([^"]*\)")/mp_raise_ValueError(MP_ERROR_TEXT("\1"))/g' mod_can.c
          sed -i 's/mp_raise_msg(&\([^,]*\), "\([^"]*\)")/mp_raise_msg(\&\1, MP_ERROR_TEXT("\2"))/g' mod_can.c
          sed -i 's/mp_raise_msg_varg(&\([^,]*\), "\([^"]*\)"/mp_raise_msg_varg(\&\1, MP_ERROR_TEXT("\2")/g' mod_can.c

          sed -i '/CAN: Loopback flag/,/check_esp_err(twai_driver_install_v2/{
            /check_esp_err(twai_driver_install_v2/i \    \/\/ Cleanup stale TWAI driver (fixes soft-reboot ESP_ERR_INVALID_STATE)\n    twai_stop();\n    twai_driver_uninstall();
          }' mod_can.c

          echo "=== TWAI patches applied ==="

      - name: Configure board for ESP32-S3-Zero (4MB Flash, 2MB PSRAM)
        run: |
          cd $HOME/micropython/ports/esp32/boards/ESP32_GENERIC_S3

          cat > partitions_4mb.csv << 'PARTCSV'
          # Name,   Type, SubType, Offset,  Size,    Flags
          nvs,      data, nvs,     0x9000,  0x6000,
          phy_init, data, phy,     0xf000,  0x1000,
          factory,  app,  factory, 0x10000, 0x1F0000,
          vfs,      data, fat,     0x200000,0x200000,
          PARTCSV

          cat > sdkconfig.board << 'SDKCFG'
          CONFIG_ESPTOOLPY_FLASHSIZE_4MB=y
          CONFIG_PARTITION_TABLE_CUSTOM=y
          CONFIG_PARTITION_TABLE_CUSTOM_FILENAME="boards/ESP32_GENERIC_S3/partitions_4mb.csv"
          CONFIG_ESP_CONSOLE_USB_SERIAL_JTAG=y
          CONFIG_ESP_CONSOLE_SECONDARY_NONE=y
          CONFIG_SPIRAM=y
          CONFIG_SPIRAM_MODE_QUAD=y
          CONFIG_SPIRAM_SPEED_80M=y
          CONFIG_SPIRAM_TRY_ALLOCATE_WIFI_LWIP=y
          CONFIG_SPIRAM_MALLOC_ALWAYSINTERNAL=4096
          CONFIG_SPIRAM_MALLOC_RESERVE_INTERNAL=32768
          SDKCFG

          echo "--- Board config ready ---"

      - name: Build mpy-cross
        run: |
          cd $HOME/micropython
          make -C mpy-cross -j$(nproc)

      - name: Build submodules
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32
          rm -f *.lock
          make submodules

      - name: Build MicroPython with TWAI + TFTCore
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32

          rm -rf build_ESP32_GENERIC_S3

          idf.py \
            -D MICROPY_BOARD=ESP32_GENERIC_S3 \
            -D USER_C_MODULES=../../../../cmodules/micropython.cmake \
            -B build_ESP32_GENERIC_S3 \
            build \
          || {
            echo "===== BUILD FAILED ====="
            echo "--- STDERR LOGS ---"
            for f in build_ESP32_GENERIC_S3/log/idf_py_stderr_output_*; do
              echo "=== $f ==="; [ -f "$f" ] && cat "$f"
            done
            echo "--- STDOUT LOGS (tail 100) ---"
            for f in build_ESP32_GENERIC_S3/log/idf_py_stdout_output_*; do
              echo "=== $f ==="; [ -f "$f" ] && tail -100 "$f"
            done
            exit 1
          }

          echo "============================================"
          echo " BUILD COMPLETE — TWAI + TFTCore"
          echo "============================================"

      - name: Generate combined firmware.bin
        run: |
          source $HOME/esp-idf/export.sh
          cd $HOME/micropython/ports/esp32

          esptool.py --chip esp32s3 merge_bin \
            -o build_ESP32_GENERIC_S3/firmware.bin \
            --flash_mode dio \
            --flash_size 4MB \
            --flash_freq 80m \
            0x0 build_ESP32_GENERIC_S3/bootloader/bootloader.bin \
            0x8000 build_ESP32_GENERIC_S3/partition_table/partition-table.bin \
            0x10000 build_ESP32_GENERIC_S3/micropython.bin

          ls -lh build_ESP32_GENERIC_S3/firmware.bin
          ls -lh build_ESP32_GENERIC_S3/micropython.bin

      - name: Upload firmware
        uses: actions/upload-artifact@v4
        with:
          name: micropython-esp32s3-twai-tftcore-firmware
          path: |
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/firmware.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/micropython.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/bootloader/bootloader.bin
            ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/partition_table/partition-table.bin
          if-no-files-found: error

      - name: Upload logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-error-logs
          path: ~/micropython/ports/esp32/build_ESP32_GENERIC_S3/log/
          if-no-files-found: warn
